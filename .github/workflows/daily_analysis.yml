name: 每日股票分析
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'

env:
  PYTHON_VERSION: '3.10'
  REPORT_DIR: 'reports'
  LOG_DIR: 'logs'

jobs:
  prepare:
    runs-on: ubuntu-latest
    name: 环境准备
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib requests || true
          mkdir -p reports logs

  analysis:
    runs-on: ubuntu-latest
    needs: prepare
    name: 并行分析任务
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          echo "开始执行股票分析"
          python analysis.py 2>&1 | tee logs/analysis.log
        env:
          TZ: Asia/Shanghai
      - uses: actions/upload-artifact@v4
        with:
          name: analysis-result
          path: reports

  report_notify:
    runs-on: ubuntu-latest
    needs: analysis
    name: 报告+推送+网页部署
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: analysis-result
          path: reports
      - name: 生成网页报告
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head>
            <meta charset='UTF-8'>
            <title>股票分析报告</title>
            <style>body{padding:30px;font-family:微软雅黑;}</style>
          </head>
          <body>
            <h1>📊 每日股票分析结果</h1>
            <p>更新时间：$(date +%Y-%m-%d\ %H:%M:%S)</p>
            <h3>报告文件</h3>" > reports/index.html
          ls reports | grep -v index.html | awk '{print "<p>"$0"</p>"}' >> reports/index.html
          echo "</body></html>" >> reports/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports
      - name: 部署网页
        id: deploy
        uses: actions/deploy-pages@v4
      - name: 推送飞书
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "msg_type":"interactive",
            "card":{
              "header":{"title":{"content":"股票分析完成","tag":"plain_text"},"status":"green"},
              "elements":[
                {"tag":"div","text":{"content":"✅ 分析执行完成","tag":"lark_md"}},
                {"tag":"div","text":{"content":"💻 电脑网页查看报告：","tag":"lark_md"}},
                {"tag":"action","actions":[{"tag":"button","text":{"content":"打开网页报告","tag":"plain_text"},"url":"${{ steps.deploy.outputs.page_url }}","type":"primary"}]}
              ]
            }
          }'
