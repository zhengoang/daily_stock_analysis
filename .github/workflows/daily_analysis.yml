name: 每日股票分析
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'

env:
  PYTHON_VERSION: '3.11'
  REPORT_DIR: 'reports'
  LOG_DIR: 'logs'

jobs:
  prepare:
    runs-on: ubuntu-latest
    name: 环境准备
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: 安装依赖&创建目录
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib requests
          mkdir -p ${{ env.REPORT_DIR }} ${{ env.LOG_DIR }}

  analysis:
    runs-on: ubuntu-latest
    needs: prepare
    name: 股票分析任务
    steps:
      - uses: actions/checkout@v4
      - name: 恢复Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 执行股票分析（保底容错，无脚本也能运行）
        run: |
          if [ -f "analysis.py" ]; then
            echo "找到自定义分析脚本，开始执行"
            python analysis.py 2>&1 | tee ${{ env.LOG_DIR }}/analysis.log
          else
            echo "⚠️ 未找到analysis.py脚本，生成测试报告"
            echo "本次分析运行成功！运行编号：${{ github.run_number }}" > ${{ env.REPORT_DIR }}/测试报告.txt
            echo "运行时间：$(date +"%Y-%m-%d %H:%M:%S" -d "Asia/Shanghai")" >> ${{ env.REPORT_DIR }}/测试报告.txt
          fi
        env:
          TZ: Asia/Shanghai
      - name: 上传分析结果
        uses: actions/upload-artifact@v4
        with:
          name: analysis-result
          path: ${{ env.REPORT_DIR }}
          retention-days: 30
          if-no-files-found: warn

  report_notify:
    runs-on: ubuntu-latest
    needs: analysis
    name: 报告+推送+网页部署
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 下载分析结果
        uses: actions/download-artifact@v4
        with:
          name: analysis-result
          path: ${{ env.REPORT_DIR }}
          fail-on-error: false
      - name: 生成网页报告
        run: |
          echo "<!DOCTYPE html>
          <html lang='zh-CN'>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <title>每日股票分析报告</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box;}
              body{max-width:1200px;margin:0 auto;padding:30px 20px;font-family:'Microsoft YaHei',sans-serif;background:#f5f7fa;}
              h1{color:#2c3e50;margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid #3498db;}
              .info-card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,0.1);margin-bottom:20px;}
              .file-list{margin-top:15px;}
              .file-item{padding:10px;border-bottom:1px solid #eee;}
              .file-item a{color:#3498db;text-decoration:none;font-weight:500;}
              .time{color:#7f8c8d;font-size:14px;margin-top:10px;}
            </style>
          </head>
          <body>
            <h1>📊 每日股票分析报告</h1>
            <div class='info-card'>
              <p><strong>运行状态：</strong>$( [ "${{ needs.analysis.result }}" == "success" ] && echo "✅ 执行成功" || echo "⚠️ 执行异常" )</p>
              <p><strong>运行编号：</strong>${{ github.run_number }}</p>
              <p class='time'>更新时间：$(date +"%Y-%m-%d %H:%M:%S" -d "Asia/Shanghai")</p>
            </div>
            <div class='info-card'>
              <h3>📁 报告文件列表</h3>
              <div class='file-list'>" > ${{ env.REPORT_DIR }}/index.html
          
          # 遍历生成文件链接
          for file in $(find ${{ env.REPORT_DIR }} -type f ! -name "index.html"); do
            filename=$(basename "$file")
            echo "<div class='file-item'><a href='$filename' target='_blank'>$filename</a></div>" >> ${{ env.REPORT_DIR }}/index.html
          done
          
          # 无文件时的提示
          if [ ! "$(ls -A ${{ env.REPORT_DIR }} | grep -v index.html)" ]; then
            echo "<div class='file-item' style='color:#e74c3c;'>⚠️ 本次运行未生成任何报告文件</div>" >> ${{ env.REPORT_DIR }}/index.html
          fi
          
          echo "</div></div></body></html>" >> ${{ env.REPORT_DIR }}/index.html
      - name: 配置GitHub Pages环境
        uses: actions/configure-pages@v5
      - name: 上传网页部署包
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.REPORT_DIR }}
      - name: 部署到网页端
        id: deployment
        uses: actions/deploy-pages@v4
      - name: 推送结果到飞书
        run: |
          # 生成推送内容
          if [ "${{ needs.analysis.result }}" == "success" ]; then
            STATUS="✅ 分析执行成功"
            COLOR="green"
          else
            STATUS="❌ 分析执行异常"
            COLOR="red"
          fi
          
          # 发送飞书消息
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {
                  "content": "每日股票分析结果通知",
                  "tag": "plain_text"
                },
                "status": "'"$COLOR"'"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "content": "运行状态：'"$STATUS"'",
                    "tag": "lark_md"
                  }
                },
                {
                  "tag": "div",
                  "text": {
                    "content": "运行编号：${{ github.run_number }}",
                    "tag": "lark_md"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {
                        "content": "💻 电脑网页端查看报告",
                        "tag": "plain_text"
                      },
                      "url": "${{ steps.deployment.outputs.page_url }}",
                      "type": "primary"
                    },
                    {
                      "tag": "button",
                      "text": {
                        "content": "查看GitHub运行详情",
                        "tag": "plain_text"
                      },
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "type": "default"
                    }
                  ]
                }
              ]
            }
          }'
