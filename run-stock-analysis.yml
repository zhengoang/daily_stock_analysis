name: 股票分析自动推送
# 触发规则：1.手动点击测试 2.交易日（周一到周五）北京时间早上9:00自动运行
on:
  workflow_dispatch: # 手动触发，在Actions页面可以点按钮运行
  schedule:
    - cron: '0 1 * * 1-5' # 北京时间周一到周五早上9:00 = UTC时间周一到周五凌晨1:00

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取你的项目代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 自动生成你的专属配置文件
        run: |
          echo "FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}" > .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> .env
          echo "WEBUI_ENABLED=false" >> .env
          echo "SCHEDULE_ENABLED=false" >> .env
          echo "RUN_IMMEDIATELY=true" >> .env
          echo "TRADING_DAY_CHECK_ENABLED=true" >> .env
          echo "LOG_LEVEL=INFO" >> .env

      - name: 运行股票分析并推送飞书
        run: python main.py --force-run
